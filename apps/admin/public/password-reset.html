<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quest! — Reset password</title>
    <script>
      // Route Supabase recovery redirects to the correct handler.
      var search = window.location.search || '';
      var hash = window.location.hash || '';

      if (search.indexOf('code=') !== -1 || search.indexOf('token_hash=') !== -1) {
        window.location.replace('/auth/confirm' + search);
      } else if (hash.indexOf('access_token=') !== -1) {
        window.location.replace('/login/reset-password' + hash);
      } else {
        window.location.replace('/login/forgot-password');
      }
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
