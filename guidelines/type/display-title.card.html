<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 24px 20px; font-family: var(--font-system); }
  .divider { height: 1px; background: rgba(15,23,42,0.06); margin: 16px 0; }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .spec { font-size: 11px; color: #94A3B8; white-space: nowrap; font-family: monospace; }
</style>
</head>
<body>
  <div class="row">
    <div style="font-size: 48px; font-weight: 800; color: #6366F1; letter-spacing: -0.02em; line-height: 1.0; flex: 1;">Quest!</div>
    <div class="spec">Display · 48px · 800 · auth wordmark only</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div style="font-size: 28px; font-weight: 800; color: #0F172A; letter-spacing: -0.02em; line-height: 1.1; flex: 1;">Your city. Your rules.</div>
    <div class="spec">Title · 28px · 800 · screen headers</div>
  </div>
</body>
</html>
