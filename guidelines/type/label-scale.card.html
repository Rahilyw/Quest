<!-- @dsCard group="Type" viewport="700x140" name="Label Scale" subtitle="700 weight · 0.03em tracking — pills, XP, badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 24px 20px; font-family: var(--font-system); }
  .row { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
  .pill { display: inline-flex; align-items: center; border-radius: 9999px; padding: 4px 12px; font-weight: 700; letter-spacing: 0.03em; line-height: 1.2; }
  .spec { font-size: 10px; color: #94A3B8; font-family: monospace; }
</style>
</head>
<body>
  <div class="row">
    <span class="pill" style="background: #DCFCE7; color: #16A34A; font-size: 11px;">fitness</span>
    <span class="pill" style="background: #6366F1; color: #fff; font-size: 11px; box-shadow: 0 4px 12px rgba(99,102,241,0.28);">Lv 4</span>
    <span class="pill" style="background: #EEF2FF; color: #4338CA; font-size: 11px;">+150 XP</span>
    <span class="pill" style="background: #FFF7ED; color: #EA580C; font-size: 11px; border: 1px solid #FDBA74;">⭐ Habit Coffee</span>
    <span class="pill" style="background: #F8FAFF; color: #94A3B8; font-size: 11px; border: 1px solid rgba(15,23,42,0.06);">📍 0.8 km</span>
    <span class="spec">Label SM · 11px · 700 · 0.03em</span>
  </div>
  <div class="row">
    <span class="pill" style="background: #F3E8FF; color: #9333EA; font-size: 13px;">🤝 Social</span>
    <span class="pill" style="background: #fff; color: #475569; font-size: 13px; border: 1.5px solid rgba(15,23,42,0.06);">All</span>
    <span class="pill" style="background: #6366F1; color: #fff; font-size: 13px; box-shadow: 0 4px 12px rgba(99,102,241,0.28);">🏃 Fitness</span>
    <span class="spec">Label · 13px · 700 · 0.03em</span>
  </div>
</body>
</html>
