<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 24px 20px; font-family: var(--font-system); }
  .item { margin-bottom: 14px; display: flex; align-items: baseline; gap: 20px; }
  .spec { font-size: 10px; color: #94A3B8; white-space: nowrap; font-family: monospace; flex-shrink: 0; }
  .divider { height: 1px; background: rgba(15,23,42,0.06); margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="item">
    <div style="font-size: 20px; font-weight: 700; color: #0F172A; line-height: 1.3; flex: 1;">Run the Galloping Goose Trail</div>
    <div class="spec">Headline · 20px · 700</div>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div style="font-size: 15px; font-weight: 400; color: #475569; line-height: 1.5; flex: 1;">Lace up and hit Victoria's iconic 60km rail trail. Any distance counts — show up, prove you went.</div>
    <div class="spec">Body · 15px · 400</div>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div style="font-size: 13px; font-weight: 400; color: #94A3B8; line-height: 1.5; flex: 1;">Submitted 2 hours ago · pending review</div>
    <div class="spec">Body SM · 13px · 400 · Mist</div>
  </div>
</body>
</html>
