<!-- @dsCard group="Colors" viewport="700x180" name="Backgrounds" subtitle="Quest Sky canvas — every screen starts here" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e2e8f0; padding: 20px; font-family: var(--font-system); }
  .row { display: flex; gap: 16px; }
  .swatch-wrap { flex: 1; }
  .swatch { height: 68px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); margin-bottom: 10px; }
  .name { font-size: 13px; font-weight: 700; color: #0D1B3E; }
  .hex  { font-size: 12px; color: #6B7FA3; margin-top: 2px; }
  .token { font-size: 11px; color: #6B7FA3; margin-top: 2px; font-family: monospace; }
  .desc  { font-size: 11px; color: #6B7FA3; margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch-wrap">
    <div class="swatch" style="background: var(--color-bg);"></div>
    <div class="name">Quest Sky</div>
    <div class="hex">#E8F3FF</div>
    <div class="token">--color-bg</div>
    <div class="desc">App base — every tab screen</div>
  </div>
  <div class="swatch-wrap">
    <div class="swatch" style="background: var(--color-bg-outer);"></div>
    <div class="name">Quest Sky Deep</div>
    <div class="hex">#C4DBFF</div>
    <div class="token">--color-bg-outer</div>
    <div class="desc">Web frame / desktop outside phone shell</div>
  </div>
  <div class="swatch-wrap">
    <div class="swatch" style="background: var(--color-navy);"></div>
    <div class="name">Navy</div>
    <div class="hex">#0D1B3E</div>
    <div class="token">--color-navy</div>
    <div class="desc">Rankings & Profile hero headers</div>
  </div>
</div>
</body>
</html>
