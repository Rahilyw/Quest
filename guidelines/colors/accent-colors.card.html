<!-- @dsCard group="Colors" viewport="700x180" name="Brand Accents" subtitle="Quest Blue + City Orange — brand and city identity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 20px; font-family: var(--font-system); }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .col { flex: 1; }
  .swatch { height: 72px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
  .pill { display: inline-flex; align-items: center; background: #4364F7; color: #fff; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 800; box-shadow: 0 4px 12px rgba(67,100,247,0.28); }
  .city { background: #FF6B35; color: #fff; border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; }
  .name  { font-size: 12px; font-weight: 700; color: #0D1B3E; }
  .hex   { font-size: 11px; color: #6B7FA3; margin-top: 2px; }
  .token { font-size: 10px; color: #6B7FA3; margin-top: 2px; font-family: monospace; }
  .desc  { font-size: 10px; color: #6B7FA3; margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <div class="swatch" style="background: var(--color-primary); box-shadow: 0 4px 12px rgba(67,100,247,0.28);">
      <div class="pill">+350 XP</div>
    </div>
    <div class="name">Quest Blue</div>
    <div class="hex">#4364F7</div>
    <div class="token">--color-primary</div>
    <div class="desc">Brand, CTAs, active tab pill, player card</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-primary-soft); border: 1.5px solid #4364F7;">
      <div style="font-size: 13px; font-weight: 700; color: #4364F7;">LV 4</div>
    </div>
    <div class="name">Quest Sky Soft</div>
    <div class="hex">#D6E9FF</div>
    <div class="token">--color-primary-soft</div>
    <div class="desc">Level chips, soft fills</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-bg); border: 1px solid var(--color-border);">
      <div class="city">Victoria, BC</div>
    </div>
    <div class="name">City Orange</div>
    <div class="hex">#FF6B35</div>
    <div class="token">--color-highlight</div>
    <div class="desc">City badge, notifications, featured callouts</div>
  </div>
</div>
</body>
</html>
