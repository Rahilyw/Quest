<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 20px; font-family: var(--font-system); }
  .row { display: flex; gap: 10px; }
  .col { flex: 1; }
  .swatch { height: 60px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .name  { font-size: 11px; font-weight: 700; color: #0F172A; }
  .hex   { font-size: 10px; color: #475569; margin-top: 2px; font-family: monospace; }
  .token { font-size: 9px; color: #94A3B8; margin-top: 2px; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <div class="swatch" style="background: var(--color-cat-fitness);">🏃</div>
    <div class="name" style="color: var(--color-cat-fitness);">Fitness</div>
    <div class="hex">#16A34A</div>
    <div class="token">--color-cat-fitness</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-cat-social);">🤝</div>
    <div class="name" style="color: var(--color-cat-social);">Social</div>
    <div class="hex">#9333EA</div>
    <div class="token">--color-cat-social</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-cat-food);">🍽️</div>
    <div class="name" style="color: var(--color-cat-food);">Food</div>
    <div class="hex">#EA580C</div>
    <div class="token">--color-cat-food</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-cat-community);">🏘️</div>
    <div class="name" style="color: var(--color-cat-community);">Community</div>
    <div class="hex">#2563EB</div>
    <div class="token">--color-cat-community</div>
  </div>
  <div class="col">
    <div class="swatch" style="background: var(--color-cat-nature);">🌿</div>
    <div class="name" style="color: var(--color-cat-nature);">Nature</div>
    <div class="hex">#0891B2</div>
    <div class="token">--color-cat-nature</div>
  </div>
</div>
</body>
</html>
