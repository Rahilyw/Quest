<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 20px; font-family: var(--font-system); }
  .row { display: flex; gap: 10px; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .iconbox { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .name  { font-size: 10px; font-weight: 700; color: #0F172A; text-align: center; }
  .hex   { font-size: 9px; color: #475569; text-align: center; font-family: monospace; }
  .token { font-size: 8px; color: #94A3B8; text-align: center; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <div class="iconbox" style="background: var(--color-cat-fitness-soft);">🏃</div>
    <div class="name" style="color: var(--color-cat-fitness);">Fitness</div>
    <div class="hex">#DCFCE7</div>
    <div class="token">--color-cat-fitness-soft</div>
  </div>
  <div class="col">
    <div class="iconbox" style="background: var(--color-cat-social-soft);">🤝</div>
    <div class="name" style="color: var(--color-cat-social);">Social</div>
    <div class="hex">#F3E8FF</div>
    <div class="token">--color-cat-social-soft</div>
  </div>
  <div class="col">
    <div class="iconbox" style="background: var(--color-cat-food-soft);">🍽️</div>
    <div class="name" style="color: var(--color-cat-food);">Food</div>
    <div class="hex">#FFEDD5</div>
    <div class="token">--color-cat-food-soft</div>
  </div>
  <div class="col">
    <div class="iconbox" style="background: var(--color-cat-community-soft);">🏘️</div>
    <div class="name" style="color: var(--color-cat-community);">Community</div>
    <div class="hex">#DBEAFE</div>
    <div class="token">--color-cat-community-soft</div>
  </div>
  <div class="col">
    <div class="iconbox" style="background: var(--color-cat-nature-soft);">🌿</div>
    <div class="name" style="color: var(--color-cat-nature);">Nature</div>
    <div class="hex">#CFFAFE</div>
    <div class="token">--color-cat-nature-soft</div>
  </div>
</div>
</body>
</html>
