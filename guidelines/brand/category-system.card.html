<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 20px; font-family: var(--font-system); }
  .row { display: flex; gap: 12px; }
  .unit { flex: 1; background: var(--color-surface); border-radius: 14px; padding: 12px; border: 1px solid var(--color-border); box-shadow: 0 6px 16px rgba(15,23,42,0.07); }
  .iconbox { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px; }
  .pill { display: inline-flex; border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 6px; }
  .xp { font-size: 12px; font-weight: 800; }
</style>
</head>
<body>
<div class="row">
  <div class="unit">
    <div class="iconbox" style="background:#DCFCE7;">🏃</div>
    <div class="pill" style="background:#DCFCE7; color:#16A34A;">fitness</div>
    <div class="xp" style="color:#16A34A;">+150 XP</div>
  </div>
  <div class="unit">
    <div class="iconbox" style="background:#F3E8FF;">🤝</div>
    <div class="pill" style="background:#F3E8FF; color:#9333EA;">social</div>
    <div class="xp" style="color:#9333EA;">+125 XP</div>
  </div>
  <div class="unit">
    <div class="iconbox" style="background:#FFEDD5;">🍽️</div>
    <div class="pill" style="background:#FFF7ED; border:1px solid #FDBA74; color:#EA580C;">⭐ Habit Coffee</div>
    <div class="xp" style="color:#EA580C;">+75 XP</div>
  </div>
  <div class="unit">
    <div class="iconbox" style="background:#DBEAFE;">🏘️</div>
    <div class="pill" style="background:#DBEAFE; color:#2563EB;">community</div>
    <div class="xp" style="color:#2563EB;">+200 XP</div>
  </div>
  <div class="unit">
    <div class="iconbox" style="background:#CFFAFE;">🌿</div>
    <div class="pill" style="background:#CFFAFE; color:#0891B2;">nature</div>
    <div class="xp" style="color:#0891B2;">+100 XP</div>
  </div>
</div>
</body>
</html>
