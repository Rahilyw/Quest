<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="QUEST! — Poppins 900, Quest Blue on sky" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-system); }
  .row { display: flex; height: 160px; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .mark { font-size: 52px; font-weight: 900; letter-spacing: -1px; line-height: 1.0; }
  .tag  { font-size: 14px; color: #6B7FA3; font-weight: 400; }
  .rule { font-size: 10px; color: #6B7FA3; font-family: monospace; margin-top: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="half" style="background: #E8F3FF;">
    <div class="mark" style="color: #4364F7;">QUEST!</div>
    <div class="tag">Real life, gamified.</div>
    <div class="rule">Quest Blue on Quest Sky</div>
  </div>
  <div class="half" style="background: #0D1B3E;">
    <div class="mark" style="color: #FFFFFF;">QUEST!</div>
    <div class="tag" style="color: rgba(255,255,255,0.5);">Real life, gamified.</div>
    <div class="rule" style="color: rgba(255,255,255,0.35);">White on Navy — Rankings hero</div>
  </div>
</div>
</body>
</html>
