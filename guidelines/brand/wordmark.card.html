<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-system); }
  .row { display: flex; height: 160px; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .mark { font-size: 52px; font-weight: 800; letter-spacing: -1px; line-height: 1.0; }
  .tag  { font-size: 14px; color: #94A3B8; font-weight: 400; }
  .rule { font-size: 10px; color: #94A3B8; font-family: monospace; margin-top: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="half" style="background: #F0F9FF;">
    <div class="mark" style="color: #6366F1;">Quest!</div>
    <div class="tag">Real life, gamified.</div>
    <div class="rule">Local Signal on Saltwater Sky</div>
  </div>
  <div class="half" style="background: #0F172A;">
    <div class="mark" style="color: #6366F1;">Quest!</div>
    <div class="tag" style="color: #475569;">Real life, gamified.</div>
    <div class="rule" style="color: #475569;">On Ink — admin/dark contexts</div>
  </div>
</div>
</body>
</html>
