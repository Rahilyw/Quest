<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4 → 24px in 6 steps — xs through xxl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); padding: 24px 20px; font-family: var(--font-system); }
  .row { display: flex; align-items: flex-end; gap: 8px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .bar { background: #6366F1; border-radius: 4px; width: 100%; opacity: 0.85; }
  .label { font-size: 11px; font-weight: 700; color: #0F172A; }
  .px    { font-size: 10px; color: #475569; }
  .token { font-size: 9px; color: #94A3B8; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height: 4px;"></div><div class="label">xs</div><div class="px">4px</div><div class="token">--space-xs</div></div>
  <div class="col"><div class="bar" style="height: 8px;"></div><div class="label">sm</div><div class="px">8px</div><div class="token">--space-sm</div></div>
  <div class="col"><div class="bar" style="height: 12px;"></div><div class="label">md</div><div class="px">12px</div><div class="token">--space-md</div></div>
  <div class="col"><div class="bar" style="height: 16px;"></div><div class="label">lg</div><div class="px">16px</div><div class="token">--space-lg</div></div>
  <div class="col"><div class="bar" style="height: 20px;"></div><div class="label">xl</div><div class="px">20px</div><div class="token">--space-xl</div></div>
  <div class="col"><div class="bar" style="height: 24px;"></div><div class="label">xxl</div><div class="px">24px</div><div class="token">--space-xxl</div></div>
</div>
</body>
</html>
